<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EverNote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#09090b">
<link rel="apple-touch-icon" href="./logo192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="EverNote">
</head>
<body>

<!-- Access Code Screen -->
<div id="access-screen" class="access-screen">
  <div class="access-container">
    <div class="access-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <h1 class="app-title">EverNote</h1>
    <p class="access-subtitle">Enter your access code</p>
    <div id="code-display" class="code-display">••••••••</div>
    <div id="access-status" style="margin-top: 20px; text-align: center; font-weight: 600; font-size: 14px; min-height: 24px;"></div>
    <div class="keypad">
      <button class="keypad-btn" data-digit="1">1</button>
      <button class="keypad-btn" data-digit="2">2</button>
      <button class="keypad-btn" data-digit="3">3</button>
      <button class="keypad-btn" data-digit="4">4</button>
      <button class="keypad-btn" data-digit="5">5</button>
      <button class="keypad-btn" data-digit="6">6</button>
      <button class="keypad-btn" data-digit="7">7</button>
      <button class="keypad-btn" data-digit="8">8</button>
      <button class="keypad-btn" data-digit="9">9</button>
      <button class="keypad-btn keypad-btn-delete" data-action="delete">⌫</button>
      <button class="keypad-btn" data-digit="0">0</button>
      <button class="keypad-btn keypad-btn-clear" data-action="clear">C</button>
    </div>
  </div>
</div>

<!-- Worker Dashboard -->
<div id="worker-dashboard" class="app hidden">
  <!-- Menu Overlay -->
  <div id="worker-menu-overlay" class="menu-overlay hidden" onclick="closeWorkerMenu()"></div>
  <!-- Side Menu -->
  <div id="worker-side-menu" class="side-menu hidden">
    <div class="menu-header">
      <h2 style="margin: 0; color: var(--text);">Menu</h2>
      <button id="worker-close-menu-btn" class="icon-btn" onclick="closeWorkerMenu()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="menu-items">
      <div class="menu-item" id="worker-menu-logout" onclick="logout(); closeWorkerMenu();">
        Logout
      </div>
    </div>
  </div>
  
  <header class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <button id="worker-menu-toggle-btn" class="header-icon-btn" title="Menu" onclick="openWorkerMenu()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <h1 class="app-title">EverNote</h1>
      <div style="width: 40px;"></div> <!-- Spacer for balance -->
    </div>
    <div class="tabs">
      <button id="tab-today" class="tab active">Today</button>
      <button id="tab-all" class="tab">All</button>
    </div>
  </header>
  <main class="main">
    <section id="worker-form-section" class="form-section">
      <div class="form-row">
        <input id="note-date" type="date" placeholder="Note Date">
      </div>
      <div class="form-row">
        <div class="input-with-icon">
          <input id="phone" type="tel" placeholder="Number" inputmode="numeric" pattern="[0-9]{11}" list="phone-suggestions">
          <button id="paste-phone" type="button" class="icon-btn" title="Paste number">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div id="duplicate-warning" class="warning-msg hidden"></div>
        <datalist id="phone-suggestions"></datalist>
      </div>
      <div class="form-row">
        <textarea id="note" rows="3" placeholder="Note"></textarea>
      </div>
      <div class="form-actions">
        <button id="save" class="save">Save Note</button>
        <div id="status" style="margin-top: 0.5rem; text-align: center; font-size: 0.85rem;"></div>
      </div>
    </section>
    <section id="today-view" class="list-section"></section>
    <section id="all-view" class="list-section hidden"></section>
  </main>
</div>

<!-- Admin Dashboard -->
<div id="admin-dashboard" class="app hidden">
  <!-- Menu Overlay -->
  <div id="admin-menu-overlay" class="menu-overlay hidden" onclick="closeAdminMenu()"></div>
  <!-- Side Menu -->
  <div id="admin-side-menu" class="side-menu hidden">
    <div class="menu-header">
      <h2 style="margin: 0; color: var(--text);">Menu</h2>
      <button id="close-menu-btn" class="icon-btn" onclick="closeAdminMenu()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="menu-items">
      <div class="menu-item active" id="menu-item-add-note" onclick="selectAdminMenuItem('add-note')">
        Add Note
      </div>
      <div class="menu-item" id="menu-item-workers" onclick="selectAdminMenuItem('workers')">
        Workers
      </div>
      <div class="menu-item" id="menu-item-worker-notes" onclick="selectAdminMenuItem('worker-notes')">
        Worker's Notes
      </div>
      <div class="menu-item" id="admin-menu-logout" onclick="logout(); closeAdminMenu();">
        Logout
      </div>
    </div>
  </div>

  <header class="header">
    <div class="admin-header-row">
      <!-- Left Column - Menu Button -->
      <div class="admin-header-left">
        <button id="menu-toggle-btn" class="header-icon-btn" title="Menu" onclick="openAdminMenu()">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <!-- Center Column - Title -->
      <div class="admin-header-center">
        <h1 class="app-title">EverNote Admin</h1>
      </div>
      <div class="admin-header-right" style="width: 40px;"></div> <!-- Spacer for balance -->
    </div>
    <div class="tabs admin-tabs hidden" id="admin-tabs-container">
      <button id="admin-tab-add-note" class="tab">Add Note</button>
      <button id="admin-tab-all-notes" class="tab">All Notes</button>
    </div>
  </header>
  <main class="main">
    <!-- Worker Management Section -->
    <section id="admin-worker-section">
      <section class="form-section">
        <h3 style="margin: 0 0 16px 0; font-size: 18px;">Add New Worker</h3>
        <div class="form-row">
          <input id="new-worker-name" type="text" placeholder="Worker Name">
        </div>
        <div class="form-row">
          <input id="new-worker-code" type="text" placeholder="Access Code (e.g., 2222)">
        </div>
        <div class="form-actions">
          <button id="add-worker-btn" class="save">Add Worker</button>
        </div>
      </section>
      <!-- Worker List Section -->
      <section id="worker-list" class="list-section"></section>
      <!-- Selected Worker Notes Section -->
      <section id="admin-worker-notes" class="list-section hidden">
        <div class="list-header">
          <div style="display: flex; gap: 12px; align-items: center;">
            <button id="back-to-workers" class="icon-btn" title="Back" onclick="backToWorkerList()">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <div>
              <div class="list-title" id="selected-worker-name"></div>
              <div id="selected-worker-stats" style="font-size: 13px; color: var(--text-muted);"></div>
            </div>
          </div>
        </div>
        <div id="admin-worker-today-view" style="margin-top: 16px;"></div>
        <div id="admin-worker-all-view" style="margin-top: 16px;"></div>
      </section>
    </section>

    <!-- Worker's Notes Section -->
    <section id="admin-worker-notes-section" class="hidden">
      <!-- Worker Filter Section -->
      <section class="form-section">
        <h3 style="margin: 0 0 16px 0; font-size: 18px;">Select Workers to View Notes</h3>
        <div id="worker-filter-list" class="worker-filter-list"></div>
      </section>
      <!-- Filtered Notes Section -->
      <section id="filtered-notes-section" class="list-section" style="margin-top: 24px;">
        <div class="list-header">
          <div class="list-title">Filtered Notes</div>
        </div>
        <div id="filtered-notes-container"></div>
      </section>
    </section>

    <!-- Admin Note Saving Section -->
    <section id="admin-note-section" class="hidden">
      <div class="form-section">
        <div class="form-row">
          <input id="admin-note-date" type="date" placeholder="Note Date">
        </div>
        <div class="form-row">
          <div class="input-with-icon">
            <input id="admin-phone" type="tel" placeholder="Number" inputmode="numeric" pattern="[0-9]{11}">
          </div>
        </div>
        <div class="form-row">
          <textarea id="admin-note" rows="3" placeholder="Note"></textarea>
        </div>
        <div class="form-actions">
          <button id="admin-save-btn" class="save">Save Note</button>
          <div id="admin-status" style="margin-top: 0.5rem; text-align: center; font-size: 0.85rem;"></div>
        </div>
      </div>
      <!-- Admin Today's Notes Section -->
      <section id="admin-today-notes" class="list-section" style="margin-top: 24px;">
        <div id="admin-today-notes-container"></div>
      </section>
    </section>

    <!-- All Notes Section -->
    <section id="admin-all-notes-section" class="list-section hidden">
      <div id="admin-all-notes-container"></div>
    </section>
  </main>
</div>

<!-- Modal for full note -->
<div id="note-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Full Note</h3>
      <button id="close-modal" class="close-btn">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-footer" class="modal-footer">
      <span id="modal-date"></span>
      <span id="modal-phone"></span>
    </div>
  </div>
</div>

<!-- Modal for editing worker -->
<div id="edit-worker-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Edit Worker</h3>
      <button id="close-edit-worker-modal" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Worker Name</label>
        <input id="edit-worker-name" type="text" placeholder="Worker Name">
      </div>
      <div class="form-row">
        <label>Access Code</label>
        <input id="edit-worker-code" type="text" placeholder="Access Code">
      </div>
    </div>
    <div class="modal-footer" style="justify-content: flex-end;">
      <button id="save-worker-btn" class="save" style="width: auto; padding: 10px 24px;">Save Changes</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
